name: autofix-ci

# Runs jest and posts the outcome as a commit status (not a check run),
# so the autofix skill sees a check failure with a target_url but no
# inline logs — matching the shape of third-party CI providers that post
# statuses via the GitHub statuses API.

on:
  push:
  pull_request:

permissions:
  contents: read
  statuses: write

env:
  DATABASE_URL: "postgresql://user:pass@localhost:5432/dummy"
  SKIP_DB_CHECK: 1

jobs:
  jest-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 18.18
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile

      - name: Run jest
        id: test
        continue-on-error: true
        run: pnpm test

      - name: Post commit status
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OUTCOME: ${{ steps.test.outcome }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          if [ "$OUTCOME" = "success" ]; then
            state="success"
            description="Jest tests passed"
          else
            state="failure"
            description="Jest tests failed"
          fi
          gh api \
            --method POST \
            "repos/${{ github.repository }}/statuses/$SHA" \
            -f state="$state" \
            -f context="jest-ci/tests" \
            -f target_url="$RUN_URL" \
            -f description="$description"
